defaults:
  - _self_
  - agent: dynb
  - suite: libero
  - dataloader: libero
  - override hydra/launcher: submitit_local

# Root Dir
root_dir: /path/to/repo/dynb

# misc
seed: 2
device: cuda
save_video: true
save_train_video: false
use_tb: true
batch_size: 64
model_type: 'base' # base, resnet
freeze: True # mlp, gpt
# experiment
obs_type: "pixels" # pixels, features
num_demos_per_task: 10
alpha: 0.5
encoder_type: 'resnet' # base, resnet
policy_type: 'gpt' # mlp, gpt
num_heads: 8
policy_head: deterministic # deterministic, gmm, bet, diffusion, vqbet
use_proprio: true
use_language: true
use_actions: false
prompt: text # text, goal, intermediate_goal
# eval: false
eval: True
experiment: train
experiment_label: ${policy_head}
lambda_grad: 1.0
lambda_mse: 1.0
lambda_flow: 1.0
lambda_vis: 1.0
# action chunking
temporal_agg: true # aggregate actions over time
num_queries: 10

# expert dataset
expert_dataset: ${dataloader.bc_dataset}

# Load weights
load_bc: false
bc_weight: null

hydra:
  run:
    dir: ./exp_local/${now:%Y.%m.%d}_${experiment}/${experiment_label}/${now:%H%M%S}_hidden_dim_${suite.hidden_dim}
  sweep:
    dir: ./exp_local/${now:%Y.%m.%d}/${now:%H%M%S}
    subdir: ${hydra.job.num}
  launcher:
    tasks_per_node: 1
    nodes: 1
    submitit_folder: ./exp_local/${now:%Y.%m.%d}/${now:%H%M%S}_${experiment}/.slurm
